[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/dashboard run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "NODE_ENV=production pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
