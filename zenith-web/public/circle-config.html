<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="/zenith-theme.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Configuration - Zenith</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1419; color: #e0e0e0; }
    
    .container { display: flex; height: 100vh; }
    .sidebar { width: 260px; background: #1a1f2e; border-right: 1px solid #2a3f5f; overflow-y: auto; position: relative; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .header { background: #1a1f2e; border-bottom: 1px solid #2a3f5f; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .content { flex: 1; overflow-y: auto; padding: 24px; }
    
    .sidebar-item { padding: 12px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.2s; }
    .sidebar-item:hover { background: #252d3d; }
    .sidebar-item.active { background: #2a3f5f; border-left-color: #4a9eff; }
    .sidebar-item i { margin-right: 12px; width: 20px; }
    
    .config-section { background: #1a1f2e; border: 1px solid #2a3f5f; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .config-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; }
    .config-title i { margin-right: 12px; color: #4a9eff; }
    
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; }
    .form-input, .form-select { width: 100%; padding: 10px 12px; background: #252d3d; border: 1px solid #2a3f5f; border-radius: 6px; color: #e0e0e0; font-size: 14px; }
    .form-input:focus, .form-select:focus { outline: none; border-color: #4a9eff; }
    
    .btn { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
    .btn-primary { background: #4a9eff; color: #fff; }
    .btn-primary:hover { background: #3a8eef; }
    .btn-secondary { background: #2a3f5f; color: #e0e0e0; }
    .btn-secondary:hover { background: #3a4f7f; }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    
    .toggle-switch { display: flex; align-items: center; }
    .toggle-switch input { margin-right: 12px; }
    
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; }
    .alert-success { background: #1a4d2e; border: 1px solid #2d7a3f; color: #4ade80; }
    .alert-error { background: #4d1a1a; border: 1px solid #7a2d2d; color: #ff6b6b; }
    
    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #2a3f5f; display: flex; overflow-x: auto; }
      .sidebar-item { flex: 1; min-width: 120px; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="stylesheet" href="/zenith-theme.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar" id="sidebar">
      <div style="padding: 16px; border-bottom: 1px solid #2a3f5f;">
        <h3 style="font-size: 16px; margin-bottom: 8px;">⚙️ Configuration</h3>
      </div>
      <div class="sidebar-item active" onclick="showSection('general')"><i class="fas fa-cog"></i> General</div>
      <div class="sidebar-item" onclick="showSection('channels')"><i class="fas fa-hashtag"></i> Channels</div>
      <div class="sidebar-item" onclick="showSection('roles')"><i class="fas fa-shield"></i> Roles</div>
      <div class="sidebar-item" onclick="showSection('moderation')"><i class="fas fa-gavel"></i> Moderation</div>
      <div class="sidebar-item" onclick="showSection('applications')"><i class="fas fa-file-alt"></i> Applications</div>
      <div class="sidebar-item" onclick="showSection('automation')"><i class="fas fa-robot"></i> Automation</div>
      <div class="sidebar-item" onclick="showSection('logging')"><i class="fas fa-book"></i> Logging</div>
    </aside>
    
    <div class="main">
      <div class="header">
        <h1>Circle Configuration</h1>
        <button class="btn btn-primary" onclick="saveAllConfig()"><i class="fas fa-save"></i> Save All</button>
      </div>
      
      <div class="content">
        <div id="alert-container"></div>
        
        <!-- General Section -->
        <div id="general" class="config-section" style="display: block;">
          <div class="config-title"><i class="fas fa-cog"></i> General Settings</div>
          <div class="form-group">
            <label class="form-label">Server Name</label>
            <input type="text" id="serverName" class="form-input" placeholder="Your server name">
          </div>
          <div class="form-group">
            <label class="form-label">Command Prefix</label>
            <input type="text" id="prefix" class="form-input" placeholder="!" value="!">
          </div>
          <div class="form-group">
            <label class="form-label">Server Icon URL</label>
            <input type="text" id="iconUrl" class="form-input" placeholder="https://...">
          </div>
          <div class="form-group">
            <label class="form-label">
              <div class="toggle-switch">
                <input type="checkbox" id="premiumEnabled">
                <span>Premium Enabled</span>
              </div>
            </label>
          </div>
        </div>
        
        <!-- Channels Section -->
        <div id="channels" class="config-section" style="display: none;">
          <div class="config-title"><i class="fas fa-hashtag"></i> Channel Configuration</div>
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">LOA Channel</label>
              <select id="loaChannel" class="form-select"><option>Loading...</option></select>
            </div>
            <div class="form-group">
              <label class="form-label">Applications Channel</label>
              <select id="appsChannel" class="form-select"><option>Loading...</option></select>
            </div>
            <div class="form-group">
              <label class="form-label">Logs Channel</label>
              <select id="logsChannel" class="form-select"><option>Loading...</option></select>
            </div>
            <div class="form-group">
              <label class="form-label">Announcements Channel</label>
              <select id="announcementsChannel" class="form-select"><option>Loading...</option></select>
            </div>
          </div>
        </div>
        
        <!-- Roles Section -->
        <div id="roles" class="config-section" style="display: none;">
          <div class="config-title"><i class="fas fa-shield"></i> Role Configuration</div>
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Staff Role</label>
              <select id="staffRole" class="form-select"><option>Loading...</option></select>
            </div>
            <div class="form-group">
              <label class="form-label">Admin Role</label>
              <select id="adminRole" class="form-select"><option>Loading...</option></select>
            </div>
            <div class="form-group">
              <label class="form-label">Manager Role</label>
              <select id="managerRole" class="form-select"><option>Loading...</option></select>
            </div>
            <div class="form-group">
              <label class="form-label">Moderator Role</label>
              <select id="modRole" class="form-select"><option>Loading...</option></select>
            </div>
          </div>
        </div>
        
        <!-- Moderation Section -->
        <div id="moderation" class="config-section" style="display: none;">
          <div class="config-title"><i class="fas fa-gavel"></i> Moderation Settings</div>
          <div class="form-group">
            <label class="form-label">
              <div class="toggle-switch">
                <input type="checkbox" id="strikeSystemEnabled">
                <span>Enable Strike System</span>
              </div>
            </label>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Strikes Until Ban</label>
              <input type="number" id="strikesUntilBan" class="form-input" value="5" min="1">
            </div>
            <div class="form-group">
              <label class="form-label">Strike Expiration (days)</label>
              <input type="number" id="strikeExpiration" class="form-input" value="30" min="1">
            </div>
          </div>
        </div>
        
        <!-- Applications Section -->
        <div id="applications" class="config-section" style="display: none;">
          <div class="config-title"><i class="fas fa-file-alt"></i> Applications</div>
          <div class="form-group">
            <label class="form-label">
              <div class="toggle-switch">
                <input type="checkbox" id="applicationsEnabled">
                <span>Enable Applications</span>
              </div>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">Application Title</label>
            <input type="text" id="appTitle" class="form-input" placeholder="Staff Application">
          </div>
          <div class="form-group">
            <label class="form-label">
              <div class="toggle-switch">
                <input type="checkbox" id="requireRecommendations">
                <span>Require Recommendations</span>
              </div>
            </label>
          </div>
        </div>
        
        <!-- Automation Section -->
        <div id="automation" class="config-section" style="display: none;">
          <div class="config-title"><i class="fas fa-robot"></i> Automation</div>
          <div class="form-group">
            <label class="form-label">
              <div class="toggle-switch">
                <input type="checkbox" id="autoRole">
                <span>Auto-assign Role on Join</span>
              </div>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">
              <div class="toggle-switch">
                <input type="checkbox" id="autoWelcome">
                <span>Send Welcome Message</span>
              </div>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">
              <div class="toggle-switch">
                <input type="checkbox" id="autoNotify">
                <span>Auto-notify on Events</span>
              </div>
            </label>
          </div>
        </div>
        
        <!-- Logging Section -->
        <div id="logging" class="config-section" style="display: none;">
          <div class="config-title"><i class="fas fa-book"></i> Logging</div>
          <div class="form-group">
            <label class="form-label">
              <div class="toggle-switch">
                <input type="checkbox" id="logStrikes">
                <span>Log Strikes</span>
              </div>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">
              <div class="toggle-switch">
                <input type="checkbox" id="logLOA">
                <span>Log LOA Requests</span>
              </div>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">
              <div class="toggle-switch">
                <input type="checkbox" id="logModerations">
                <span>Log Moderations</span>
              </div>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">Log Retention (days)</label>
            <input type="number" id="logRetention" class="form-input" value="90" min="1">
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    const guildId = new URLSearchParams(window.location.search).get('guild');
    
    function showSection(sectionId) {
      document.querySelectorAll('[id^="general"], [id^="channels"], [id^="roles"], [id^="moderation"], [id^="applications"], [id^="automation"], [id^="logging"]').forEach(el => {
        if (el.classList.contains('config-section')) el.style.display = 'none';
      });
      document.getElementById(sectionId).style.display = 'block';
      
      document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
      event.target.closest('.sidebar-item').classList.add('active');
    }
    
    async function loadChannels() {
      try {
        const res = await fetch(`/api/guilds/${guildId}/channels`);
        if (res.ok) {
          const channels = await res.json();
          const selects = ['loaChannel', 'appsChannel', 'logsChannel', 'announcementsChannel'];
          selects.forEach(id => {
            const select = document.getElementById(id);
            select.innerHTML = '<option value="">Select a channel</option>' + 
              channels.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
          });
        }
      } catch (err) {
        console.error('Error loading channels:', err);
      }
    }
    
    async function loadRoles() {
      try {
        const res = await fetch(`/api/guilds/${guildId}/roles-list`);
        if (res.ok) {
          const roles = await res.json();
          const selects = ['staffRole', 'adminRole', 'managerRole', 'modRole'];
          selects.forEach(id => {
            const select = document.getElementById(id);
            select.innerHTML = '<option value="">Select a role</option>' + 
              roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
          });
        }
      } catch (err) {
        console.error('Error loading roles:', err);
      }
    }
    
    async function loadConfig() {
      try {
        const res = await fetch(`/api/guilds/${guildId}/config`);
        if (res.ok) {
          const config = await res.json();
          document.getElementById('prefix').value = config.prefix || '!';
          document.getElementById('premiumEnabled').checked = config.premium_enabled || false;
          document.getElementById('loaChannel').value = config.loa_channel_id || '';
          document.getElementById('appsChannel').value = config.applications_channel_id || '';
          document.getElementById('logsChannel').value = config.logs_channel_id || '';
          document.getElementById('staffRole').value = config.staff_role_id || '';
          document.getElementById('adminRole').value = config.admin_role_id || '';
          document.getElementById('strikeSystemEnabled').checked = config.strikes_enabled || false;
          document.getElementById('applicationsEnabled').checked = config.applications_enabled || false;
        }
      } catch (err) {
        console.error('Error loading config:', err);
      }
    }
    
    async function saveAllConfig() {
      const configData = {
        prefix: document.getElementById('prefix').value || '!',
        premiumEnabled: document.getElementById('premiumEnabled').checked,
        loaChannelId: document.getElementById('loaChannel').value,
        applicationsChannelId: document.getElementById('appsChannel').value,
        logsChannelId: document.getElementById('logsChannel').value,
        staffRoleId: document.getElementById('staffRole').value,
        adminRoleId: document.getElementById('adminRole').value,
        applicationsEnabled: document.getElementById('applicationsEnabled').checked,
        applicationsTitle: document.getElementById('appTitle').value || 'Staff Application',
        strikesEnabled: document.getElementById('strikeSystemEnabled').checked,
        requireRecommendations: document.getElementById('requireRecommendations').checked,
        autoRole: document.getElementById('autoRole').checked,
        autoWelcome: document.getElementById('autoWelcome').checked,
        autoNotify: document.getElementById('autoNotify').checked,
        logStrikes: document.getElementById('logStrikes').checked,
        logLOA: document.getElementById('logLOA').checked,
        logModerations: document.getElementById('logModerations').checked,
        logRetention: parseInt(document.getElementById('logRetention').value) || 90,
      };
      
      try {
        const res = await fetch(`/api/guilds/${guildId}/config`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(configData),
        });
        
        if (res.ok) {
          showAlert('Configuration saved successfully!', 'success');
        } else {
          showAlert('Failed to save configuration', 'error');
        }
      } catch (err) {
        console.error('Error saving config:', err);
        showAlert('Error saving configuration: ' + err.message, 'error');
      }
    }
    
    function showAlert(message, type) {
      const container = document.getElementById('alert-container');
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
      container.innerHTML = '';
      container.appendChild(alert);
      setTimeout(() => alert.remove(), 5000);
    }
    
    // Initialize
    window.addEventListener('load', () => {
      loadChannels();
      loadRoles();
      loadConfig();
    });
  </script>
</body>
</html>
