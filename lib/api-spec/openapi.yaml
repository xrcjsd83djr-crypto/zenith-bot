openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Zenith Staff Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Discord OAuth authentication
  - name: guilds
    description: Guild configuration
  - name: staff
    description: Staff member management
  - name: ranks
    description: Rank management
  - name: divisions
    description: Division management
  - name: applications
    description: Staff applications
  - name: strikes
    description: Strike management
  - name: loas
    description: Leave of absence management
  - name: promotions
    description: Promotion and demotion history
  - name: meetings
    description: Meeting management
  - name: stats
    description: Dashboard statistics
  - name: premium
    description: Premium access management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/discord:
    get:
      operationId: discordAuthRedirect
      tags: [auth]
      summary: Redirect to Discord OAuth
      responses:
        "302":
          description: Redirect to Discord

  /auth/discord/callback:
    get:
      operationId: discordAuthCallback
      tags: [auth]
      summary: Discord OAuth callback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to dashboard

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscordUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/guilds:
    get:
      operationId: getUserGuilds
      tags: [auth]
      summary: Get guilds the user manages
      responses:
        "200":
          description: List of manageable guilds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscordGuild"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /guilds/{guildId}:
    get:
      operationId: getGuild
      tags: [guilds]
      summary: Get guild configuration
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Guild config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guild"
        "404":
          description: Guild not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateGuild
      tags: [guilds]
      summary: Update guild configuration
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGuildBody"
      responses:
        "200":
          description: Updated guild
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guild"

  /guilds/{guildId}/stats:
    get:
      operationId: getGuildStats
      tags: [stats]
      summary: Get dashboard statistics for a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildStats"

  /guilds/{guildId}/staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: rankId
          in: query
          schema:
            type: string
        - name: divisionId
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffListResponse"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Add a staff member
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffBody"
      responses:
        "201":
          description: Staff member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /guilds/{guildId}/staff/{staffId}:
    get:
      operationId: getStaff
      tags: [staff]
      summary: Get a staff member
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - $ref: "#/components/parameters/StaffId"
      responses:
        "200":
          description: Staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update a staff member
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - $ref: "#/components/parameters/StaffId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffBody"
      responses:
        "200":
          description: Updated staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
    delete:
      operationId: removeStaff
      tags: [staff]
      summary: Remove a staff member
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - $ref: "#/components/parameters/StaffId"
      responses:
        "204":
          description: Removed

  /guilds/{guildId}/ranks:
    get:
      operationId: listRanks
      tags: [ranks]
      summary: List ranks
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Ranks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rank"
    post:
      operationId: createRank
      tags: [ranks]
      summary: Create a rank
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRankBody"
      responses:
        "201":
          description: Rank created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rank"

  /guilds/{guildId}/ranks/{rankId}:
    patch:
      operationId: updateRank
      tags: [ranks]
      summary: Update a rank
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: rankId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRankBody"
      responses:
        "200":
          description: Updated rank
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rank"
    delete:
      operationId: deleteRank
      tags: [ranks]
      summary: Delete a rank
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: rankId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /guilds/{guildId}/divisions:
    get:
      operationId: listDivisions
      tags: [divisions]
      summary: List divisions
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Divisions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Division"
    post:
      operationId: createDivision
      tags: [divisions]
      summary: Create a division
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDivisionBody"
      responses:
        "201":
          description: Division created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Division"

  /guilds/{guildId}/divisions/{divisionId}:
    patch:
      operationId: updateDivision
      tags: [divisions]
      summary: Update a division
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: divisionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDivisionBody"
      responses:
        "200":
          description: Updated division
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Division"
    delete:
      operationId: deleteDivision
      tags: [divisions]
      summary: Delete a division
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: divisionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /guilds/{guildId}/applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Applications list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListResponse"

  /guilds/{guildId}/applications/{applicationId}/accept:
    post:
      operationId: acceptApplication
      tags: [applications]
      summary: Accept an application
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: applicationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewApplicationBody"
      responses:
        "200":
          description: Application accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /guilds/{guildId}/applications/{applicationId}/deny:
    post:
      operationId: denyApplication
      tags: [applications]
      summary: Deny an application
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: applicationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewApplicationBody"
      responses:
        "200":
          description: Application denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /guilds/{guildId}/questions:
    get:
      operationId: listApplicationQuestions
      tags: [applications]
      summary: List application questions
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Questions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationQuestion"
    post:
      operationId: createApplicationQuestion
      tags: [applications]
      summary: Create application question
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationQuestionBody"
      responses:
        "201":
          description: Question created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationQuestion"

  /guilds/{guildId}/questions/{questionId}:
    patch:
      operationId: updateApplicationQuestion
      tags: [applications]
      summary: Update application question
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: questionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationQuestionBody"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationQuestion"
    delete:
      operationId: deleteApplicationQuestion
      tags: [applications]
      summary: Delete application question
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: questionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /guilds/{guildId}/strikes:
    get:
      operationId: listStrikes
      tags: [strikes]
      summary: List strikes
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: staffId
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Strikes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Strike"
    post:
      operationId: createStrike
      tags: [strikes]
      summary: Issue a strike
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStrikeBody"
      responses:
        "201":
          description: Strike issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strike"

  /guilds/{guildId}/strikes/{strikeId}/remove:
    post:
      operationId: removeStrike
      tags: [strikes]
      summary: Remove a strike
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: strikeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveStrikeBody"
      responses:
        "200":
          description: Strike removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strike"

  /guilds/{guildId}/loas:
    get:
      operationId: listLoas
      tags: [loas]
      summary: List LOAs
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: status
          in: query
          schema:
            type: string
        - name: staffId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: LOAs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Loa"
    post:
      operationId: createLoa
      tags: [loas]
      summary: Submit LOA request
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLoaBody"
      responses:
        "201":
          description: LOA submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loa"

  /guilds/{guildId}/loas/{loaId}/approve:
    post:
      operationId: approveLoa
      tags: [loas]
      summary: Approve an LOA
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: loaId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewLoaBody"
      responses:
        "200":
          description: LOA approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loa"

  /guilds/{guildId}/loas/{loaId}/deny:
    post:
      operationId: denyLoa
      tags: [loas]
      summary: Deny an LOA
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: loaId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewLoaBody"
      responses:
        "200":
          description: LOA denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loa"

  /guilds/{guildId}/promotions:
    get:
      operationId: listPromotions
      tags: [promotions]
      summary: List promotions/demotions
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - name: staffId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Promotions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Promotion"

  /guilds/{guildId}/meetings:
    get:
      operationId: listMeetings
      tags: [meetings]
      summary: List meetings
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Meetings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meeting"
    post:
      operationId: createMeeting
      tags: [meetings]
      summary: Schedule a meeting
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeetingBody"
      responses:
        "201":
          description: Meeting created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"

  /guilds/{guildId}/premium:
    post:
      operationId: givePremium
      tags: [premium]
      summary: Grant premium access to a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GivePremiumBody"
      responses:
        "200":
          description: Premium granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guild"
    delete:
      operationId: revokePremium
      tags: [premium]
      summary: Revoke premium access
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Premium revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guild"

components:
  parameters:
    GuildId:
      name: guildId
      in: path
      required: true
      schema:
        type: string
    StaffId:
      name: staffId
      in: path
      required: true
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    DiscordUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        discriminator:
          type: string
        avatar:
          type: string
          nullable: true
        avatarUrl:
          type: string
      required: [id, username, discriminator, avatarUrl]

    DiscordGuild:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: string
          nullable: true
        iconUrl:
          type: string
          nullable: true
        isSetup:
          type: boolean
      required: [id, name, isSetup]

    Guild:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        iconUrl:
          type: string
          nullable: true
        isPremium:
          type: boolean
        staffRoleId:
          type: string
          nullable: true
        managementRoleId:
          type: string
          nullable: true
        logChannelId:
          type: string
          nullable: true
        applicationChannelId:
          type: string
          nullable: true
        applicationReviewChannelId:
          type: string
          nullable: true
        welcomeChannelId:
          type: string
          nullable: true
        embedColor:
          type: string
        embedFooter:
          type: string
          nullable: true
        customBotName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, isPremium, embedColor, createdAt]

    UpdateGuildBody:
      type: object
      properties:
        staffRoleId:
          type: string
          nullable: true
        managementRoleId:
          type: string
          nullable: true
        logChannelId:
          type: string
          nullable: true
        applicationChannelId:
          type: string
          nullable: true
        applicationReviewChannelId:
          type: string
          nullable: true
        welcomeChannelId:
          type: string
          nullable: true
        embedColor:
          type: string
        embedFooter:
          type: string
          nullable: true
        customBotName:
          type: string
          nullable: true
        customBotAvatar:
          type: string
          nullable: true

    GuildStats:
      type: object
      properties:
        totalStaff:
          type: integer
        activeStaff:
          type: integer
        pendingApplications:
          type: integer
        activeStrikes:
          type: integer
        activeLoas:
          type: integer
        totalPromotions:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
      required: [totalStaff, activeStaff, pendingApplications, activeStrikes, activeLoas, totalPromotions, recentActivity]

    ActivityItem:
      type: object
      properties:
        type:
          type: string
        description:
          type: string
        timestamp:
          type: string
          format: date-time
        actorUsername:
          type: string
      required: [type, description, timestamp, actorUsername]

    StaffMember:
      type: object
      properties:
        id:
          type: string
        guildId:
          type: string
        discordId:
          type: string
        discordUsername:
          type: string
        discordAvatarUrl:
          type: string
          nullable: true
        robloxUsername:
          type: string
          nullable: true
        rankId:
          type: string
          nullable: true
        rankName:
          type: string
          nullable: true
        divisionId:
          type: string
          nullable: true
        divisionName:
          type: string
          nullable: true
        callsign:
          type: string
          nullable: true
        isActive:
          type: boolean
        strikeCount:
          type: integer
        joinedAt:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
      required: [id, guildId, discordId, discordUsername, isActive, strikeCount, joinedAt]

    StaffListResponse:
      type: object
      properties:
        staff:
          type: array
          items:
            $ref: "#/components/schemas/StaffMember"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [staff, total, page, totalPages]

    CreateStaffBody:
      type: object
      properties:
        discordId:
          type: string
        discordUsername:
          type: string
        discordAvatarUrl:
          type: string
          nullable: true
        robloxUsername:
          type: string
          nullable: true
        rankId:
          type: string
          nullable: true
        divisionId:
          type: string
          nullable: true
        callsign:
          type: string
          nullable: true
      required: [discordId, discordUsername]

    UpdateStaffBody:
      type: object
      properties:
        rankId:
          type: string
          nullable: true
        divisionId:
          type: string
          nullable: true
        callsign:
          type: string
          nullable: true
        robloxUsername:
          type: string
          nullable: true
